<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroPrompt Semantic Compiler Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {margin:0;padding:0;box-sizing:border-box;}
    body {font-family:'JetBrains Mono',monospace;background:#020617;min-height:100vh;padding:2rem;color:white;}
    .container {max-width:1200px;margin:auto;}
    .header {margin-bottom:2rem;}
    .header-row {display:flex;align-items:center;gap:1rem;margin-bottom:0.5rem;}
    .pulse-dot {width:12px;height:12px;background:#22d3ee;border-radius:50%;animation:pulse 2s infinite;}
    @keyframes pulse {0%,100%{opacity:1;}50%{opacity:0.5;}}
    h1{font-size:1.5rem;font-weight:700;letter-spacing:-0.025em;}
    .subtitle{color:#94a3b8;font-size:0.875rem;margin-left:1.75rem;}
    .diagram-container {background:rgba(15,23,42,0.5);border-radius:1rem;border:1px solid #1e293b;padding:1.5rem;overflow-x:auto;}
    svg{width:100%;min-width:900px;display:block;}
    .footer{text-align:center;margin-top:1.5rem;color:#475569;font-size:0.75rem;}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-row">
        <div class="pulse-dot"></div>
        <h1>NeuroPrompt Semantic Compiler Architecture</h1>
      </div>
      <p class="subtitle">Component diagram for the local AI prompt‑compilation tool (runs on i5 / GTX‑660, CachyOS)</p>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
        </defs>
        <!-- Background grid -->
        <rect width="100%" height="100%" fill="url(#grid)" />

        <!-- User (external) -->
        <rect x="30" y="260" width="100" height="50" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
        <text x="80" y="280" fill="white" font-size="11" font-weight="600" text-anchor="middle">User / CLI</text>
        <text x="80" y="296" fill="#94a3b8" font-size="9" text-anchor="middle">Terminal / Script</text>

        <!-- GUI (frontend) -->
        <rect x="200" y="260" width="140" height="70" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="270" y="285" fill="white" font-size="11" font-weight="600" text-anchor="middle">GUI (Qt / PySide6)</text>
        <text x="270" y="301" fill="#94a3b8" font-size="9" text-anchor="middle">npsc_gui/main.py</text>

        <!-- Core Service (backend) -->
        <rect x="410" y="260" width="140" height="70" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="480" y="285" fill="white" font-size="11" font-weight="600" text-anchor="middle">Core Service</text>
        <text x="480" y="301" fill="#94a3b8" font-size="9" text-anchor="middle">npsc_service.py</text>

        <!-- Model Adapter (cloud) -->
        <rect x="620" y="260" width="140" height="70" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
        <text x="690" y="285" fill="white" font-size="11" font-weight="600" text-anchor="middle">Model API</text>
        <text x="690" y="301" fill="#94a3b8" font-size="9" text-anchor="middle">OpenAI / Claude / ...</text>

        <!-- Outputs (database) -->
        <rect x="410" y="380" width="140" height="70" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="480" y="405" fill="white" font-size="11" font-weight="600" text-anchor="middle">Outputs</text>
        <text x="480" y="421" fill="#94a3b8" font-size="9" text-anchor="middle">JSON, NSL, PNG, MD</text>

        <!-- Arrows: User -> GUI -->
        <line x1="132" y1="285" x2="198" y2="285" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="165" y="278" fill="#94a3b8" font-size="9" text-anchor="middle">invoke</text>
        <!-- Arrow: User (CLI) -> Core Service -->
        <line x1="132" y1="285" x2="410" y2="285" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="270" y="278" fill="#94a3b8" font-size="9" text-anchor="middle">run</text>
        <!-- Arrow: GUI -> Core Service -->
        <line x1="340" y1="295" x2="410" y2="295" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="375" y="288" fill="#94a3b8" font-size="9" text-anchor="middle">request</text>
        <!-- Arrow: Core Service -> Model API -->
        <line x1="550" y1="295" x2="620" y2="295" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="585" y="288" fill="#94a3b8" font-size="9" text-anchor="middle">call</text>
        <!-- Arrow: Core Service -> Outputs -->
        <line x1="480" y1="330" x2="480" y2="378" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="495" y="355" fill="#94a3b8" font-size="9">write</text>
        <!-- Arrow: Model API -> Core Service (response) -->
        <line x1="620" y1="330" x2="550" y2="330" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="585" y="323" fill="#94a3b8" font-size="9">response</text>

        <!-- Legend -->
        <text x="720" y="60" fill="white" font-size="10" font-weight="600">Legend</text>
        <rect x="720" y="72" width="16" height="10" rx="2" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8"/>
        <text x="742" y="80" fill="#94a3b8" font-size="8">External / CLI</text>
        <rect x="720" y="88" width="16" height="10" rx="2" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee"/>
        <text x="742" y="96" fill="#94a3b8" font-size="8">Frontend (GUI)</text>
        <rect x="720" y="104" width="16" height="10" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399"/>
        <text x="742" y="112" fill="#94a3b8" font-size="8">Backend (Service)</text>
        <rect x="720" y="120" width="16" height="10" rx="2" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24"/>
        <text x="742" y="128" fill="#94a3b8" font-size="8">External API</text>
        <rect x="720" y="136" width="16" height="10" rx="2" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa"/>
        <text x="742" y="144" fill="#94a3b8" font-size="8">Outputs / Artifacts</text>
      </svg>
    </div>
    <p class="footer">NeuroPrompt Semantic Compiler • Architecture diagram generated by Hermes</p>
  </div>
</body>
</html>
